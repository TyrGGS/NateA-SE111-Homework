<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE 111 | Week 6 LAB</title>
</head>
<body>

    <script>
        function add(x,y)
        {
            return x+y
        }
        function subtract(x,y)
        {
            return x-y
        }
        function multiply(x,y)
        {
            return x*y
        }
        function divide(x,y)
        {
            return x/y
        }

        alert("THIS IS A CALCULATOR")
        var num1 = Number(prompt("Please input your first number"))
        var num2 = Number(prompt("Please input your second number"))

        var ooo = prompt("Would you like to add, subtract, multiply or divide?")

        if (ooo === "add")
        {
            console.log(add(num1,num2))
        }
        if (ooo === "subtract")
        {
            console.log(subtract(num1,num2))
        }
        if (ooo === "multiply")
        {
            console.log(multiply(num1,num2))
        }
        if (ooo === "divide")
        {
            console.log(divide(num1,num2))
        }
    </script>
</body>
</html>
